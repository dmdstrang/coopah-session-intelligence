# Render Blueprint — one-click deploy from GitHub
# Docs: https://render.com/docs/infrastructure-as-code
services:
  - type: web
    name: coopah-session-intelligence
    runtime: node
    buildCommand: npm install && npm install --prefix server && npm install --prefix client && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # In Render Dashboard → Environment, add:
      #   STRAVA_CLIENT_ID, STRAVA_CLIENT_SECRET (from https://www.strava.com/settings/api)
      #   STRAVA_REDIRECT_URI = https://<YOUR-RENDER-URL>/api/strava/callback
      #   FRONTEND_ORIGIN = https://<YOUR-RENDER-URL>
      # Then in Strava app settings (same page), set "Authorization Callback Domain" to
      #   <YOUR-RENDER-URL> only (e.g. coopah-session-intelligence-xxxx.onrender.com, no https://)
